name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v7

    - name: Set up Go Environment
      uses: actions/setup-go@v6
      with:
        go-version: 1.25

    - name: Install dependencies
      run: go mod download

    - name: Check for compile errors
      run: go build -v ./...

    - name: Vet code
      run: go vet ./...
